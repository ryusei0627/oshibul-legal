<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://forms.gle/2g5WZzSRCLnRVntL8">
  <link rel="canonical" href="https://forms.gle/2g5WZzSRCLnRVntL8">
  <meta name="robots" content="noindex,follow">
  <title>推しブル お問い合わせフォーム</title>
  <style>
    :root {
      --primary: #FF6B9D;
      --ink: #2B0F1E;
      --ink-soft: #A87B91;
      --bg: #FFF3F7;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                   "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.12);
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 16px;
      color: var(--ink);
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink-soft);
      margin: 0 0 16px;
    }
    .button {
      display: inline-block;
      background: var(--primary);
      color: #FFFFFF;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-weight: 700;
      margin-top: 12px;
    }
    .button:active { opacity: 0.85; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--ink-soft);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>推しブル お問い合わせフォーム</h1>
    <p>お問い合わせフォームへ自動的に移動しています...</p>
    <p>移動しない場合は下のボタンをタップしてください。</p>
    <a class="button" href="https://forms.gle/2g5WZzSRCLnRVntL8">フォームを開く</a>
    <div class="footer">
      推しブル運営事務局<br>
      contact@oshibul.jp
    </div>
  </div>
</body>
</html>
