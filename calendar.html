<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://hshedudijjqauvpdmwhg.supabase.co; img-src 'self' https://hshedudijjqauvpdmwhg.supabase.co data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <title>公式カレンダー / 推しブル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FF3D7F;
      --pink-deep: #E01E63;
      --ink: #43243A;
      --ink-soft: #9A6F88;
      --ink-faint: #C2A4B4;
      --paper: #FFF3F7;
      --paper2: #FFE8F0;
      --card: #FFFFFF;
      --line: #FBE0EA;
      --sat: #6589C8;
      --sun: #D76577;
      --stub-ink: #2A1622;
      --shadow-card: 0 6px 18px rgba(160,40,90,0.10);
      --shadow-hero: 0 8px 22px rgba(160,40,90,0.12);
      --font-pop: "Mochiy Pop One", "Zen Maru Gothic", "Noto Sans JP", sans-serif;
      --font-round: "Zen Maru Gothic", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      --font-num: "Baloo 2", -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-round);
      background: radial-gradient(120% 55% at 50% 0%, var(--paper2) 0%, var(--paper) 50%);
      color: var(--ink);
      min-height: 100vh;
      padding: 12px 0 28px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 0 20px; }

    /* ヒーロー (= polaroid 枠 / 画像あり時のみ) */
    .hero {
      background: var(--card);
      border-radius: 18px;
      padding: 11px 11px 15px;
      box-shadow: var(--shadow-hero);
      border: 1px solid var(--line);
      margin-bottom: 4px;
    }
    /* 利用者 FB#2 (2026-06-23): 画像本来のアスペクト比尊重 (= 切り抜きなし / 余白上下) */
    .hero .image-wrap {
      border-radius: 12px;
      overflow: hidden;
      background: var(--paper);
    }
    .hero .image {
      display: block;
      width: 100%;
      height: auto;
    }
    .hero .meta { text-align: center; padding-top: 12px; }
    .hero .eyebrow,
    .hero-text .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-round);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--pink);
      margin-bottom: 5px;
    }
    .hero .name,
    .hero-text .name {
      font-family: var(--font-pop);
      font-size: 25px;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.15;
      margin: 0;
      word-break: break-word;
    }

    /* テキストヒーロー (= 画像なし時 / 利用者 FB#1 / 2026-06-23) */
    .hero-text {
      text-align: center;
      padding: 14px 4px 6px;
      margin-bottom: 4px;
    }

    /* 月見出し */
    .month-bar {
      padding: 22px 4px 12px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .month-bar .month {
      font-family: var(--font-pop);
      font-size: 26px;
      color: var(--pink);
    }
    .month-bar .year {
      font-family: var(--font-num);
      font-size: 16px;
      font-weight: 800;
      color: var(--ink-soft);
    }

    /* イベントカード */
    .events { display: flex; flex-direction: column; gap: 16px; }
    .event {
      display: flex;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--line);
    }

    /* 半券 (= 日付) */
    .event .stub {
      width: 68px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 4px;
      border-right: 1px solid var(--line);
      background: #fff;
    }
    .event.is-sat .stub { background: var(--sat); border-right: none; }
    .event.is-sun .stub, .event.is-hol .stub { background: var(--sun); border-right: none; }
    .event .stub .stub-month {
      font-family: var(--font-num);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      color: #fff;
      -webkit-text-stroke: 1.7px var(--stub-ink);
      paint-order: stroke fill;
    }
    .event .stub .stub-day {
      font-family: var(--font-num);
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      color: #fff;
      -webkit-text-stroke: 3.8px var(--stub-ink);
      paint-order: stroke fill;
    }
    .event .stub .stub-wd {
      font-family: var(--font-round);
      font-size: 16px;
      font-weight: 800;
      margin-top: 3px;
      color: #fff;
      -webkit-text-stroke: 1.9px var(--stub-ink);
      paint-order: stroke fill;
    }
    /* Codex B 案突合 軽微 #3: -webkit-text-stroke 非対応環境 fallback (= 黒縁を text-shadow で再現) */
    @supports not (-webkit-text-stroke: 1px black) {
      .event .stub .stub-month {
        text-shadow: -1.2px -1.2px 0 var(--stub-ink), 1.2px -1.2px 0 var(--stub-ink), -1.2px 1.2px 0 var(--stub-ink), 1.2px 1.2px 0 var(--stub-ink);
      }
      .event .stub .stub-day {
        text-shadow: -2.5px -2.5px 0 var(--stub-ink), 2.5px -2.5px 0 var(--stub-ink), -2.5px 2.5px 0 var(--stub-ink), 2.5px 2.5px 0 var(--stub-ink);
      }
      .event .stub .stub-wd {
        text-shadow: -1.5px -1.5px 0 var(--stub-ink), 1.5px -1.5px 0 var(--stub-ink), -1.5px 1.5px 0 var(--stub-ink), 1.5px 1.5px 0 var(--stub-ink);
      }
    }

    /* 本文 */
    .event .body {
      flex: 1;
      min-width: 0;
      padding: 15px 16px 16px;
    }
    .event .head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
      flex-wrap: wrap;
    }
    .event .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 11px;
      border-radius: 999px;
    }
    .event .chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 4px;
    }
    .event .chip .chip-label {
      font-family: var(--font-round);
      font-size: 11.5px;
      font-weight: 800;
    }
    .event .title {
      margin: 0 0 12px;
      font-family: var(--font-pop);
      font-size: 17px;
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      word-break: break-word;
    }

    /* 情報行 (会場 / 公演 / 特典会 / 開場) */
    .event .rows { margin-bottom: 14px; }
    .event .row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 6px 0;
      border-top: 1px solid var(--line);
    }
    .event .row .row-label {
      width: 56px;
      flex-shrink: 0;
      font-family: var(--font-round);
      font-size: 12px;
      font-weight: 800;
      color: var(--ink-soft);
    }
    .event .row .row-value {
      font-family: var(--font-round);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      word-break: break-word;
      flex: 1;
    }

    /* 料金 (= 複数チケット縦リスト / 半券モチーフ維持) */
    .event .tickets {
      border-top: 1px solid var(--line);
      padding: 8px 0 10px;
      margin-bottom: 14px;
    }
    .event .tickets .tickets-label {
      font-family: var(--font-round);
      font-size: 12px;
      font-weight: 800;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .event .tickets .tickets-empty {
      font-family: var(--font-round);
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-faint);
    }
    .event .tickets-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .event .tickets-item {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 10px;
      background: var(--paper);
      border-radius: 10px;
      flex-wrap: wrap;
    }
    .event .tickets-name {
      font-family: var(--font-round);
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
    }
    .event .tickets-price {
      font-family: var(--font-num);
      font-size: 15px;
      font-weight: 800;
      color: var(--pink-deep);
      margin-left: auto;
    }
    .event .tickets-price.free { color: #1A9F8C; }
    .event .tickets-link {
      flex-basis: 100%;
      display: block;
      text-align: center;
      text-decoration: none;
      font-family: var(--font-round);
      font-size: 13.5px;
      font-weight: 800;
      color: #fff;
      background: var(--pink);
      border-radius: 999px;
      padding: 9px 8px;
      margin-top: 4px;
    }

    /* 入場特典 */
    .event .benefits {
      background: var(--paper);
      border-radius: 12px;
      padding: 11px 13px;
    }
    .event .benefits .ben-label {
      font-family: var(--font-round);
      font-size: 11.5px;
      font-weight: 800;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    .event .benefits ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .event .benefits li {
      display: flex;
      align-items: baseline;
      gap: 7px;
    }
    .event .benefits .ben-mark {
      font-size: 10px;
      color: var(--pink);
      line-height: 1;
    }
    .event .benefits .ben-text {
      font-family: var(--font-round);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.4;
    }

    /* 空 / エラー / ロード */
    .empty, .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.7;
      font-family: var(--font-round);
    }
    .empty .icon, .error .icon { font-size: 40px; margin-bottom: 12px; }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
      font-size: 14px;
      font-family: var(--font-round);
    }
    .loading .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--pink);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.15s; }
    .loading .loading-dot-3 { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* フッター */
    .footer {
      margin-top: 24px;
      text-align: center;
      padding: 6px 22px 4px;
      font-family: var(--font-round);
    }
    .footer .footer-label {
      font-size: 12.5px;
      font-weight: 800;
      color: var(--ink-soft);
    }
    .footer .footer-sub {
      margin-top: 6px;
      font-size: 11px;
      color: var(--ink-faint);
      line-height: 1.7;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="calendar.js?v=3" defer></script>
</head>
<body>
  <div class="wrap">
    <div id="root" class="loading" role="status" aria-live="polite">
      <div><span class="dot"></span><span class="dot"></span><span class="dot loading-dot-3"></span></div>
      <div style="margin-top: 12px;">読み込み中...</div>
    </div>
    <div class="footer">
      <div class="footer-label">推しブル / Oshibul 公式カレンダー</div>
      <div class="footer-sub">このページは検索エンジンには載せていません。</div>
    </div>
  </div>
</body>
</html>
