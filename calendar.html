<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://hshedudijjqauvpdmwhg.supabase.co; img-src 'self' https://hshedudijjqauvpdmwhg.supabase.co data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
  <title>公式カレンダー / 推しブル</title>
  <style>
    :root {
      --primary: #FF6B9D;
      --primary-deep: #FF3D7F;
      --ink: #2B0F1E;
      --ink-soft: #A87B91;
      --ink-faint: #C9A6B8;
      --bg: #FFF3F7;
      --card: #FFFFFF;
      --border: #FFE0EC;
      --shadow: 0 4px 20px rgba(255, 107, 157, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 20px 16px 60px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; }

    .group-card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
    }
    .group-card .swatch {
      width: 6px;
      align-self: stretch;
      border-radius: 4px;
      background: var(--primary);
      flex-shrink: 0;
    }
    .group-card .image {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .group-card .meta { flex: 1; min-width: 0; }
    .group-card .label { font-size: 11px; font-weight: 700; color: var(--ink-soft); letter-spacing: 0.04em; }
    .group-card .name { font-size: 20px; font-weight: 800; margin: 4px 0 0; color: var(--ink); word-break: break-word; }

    .events { display: flex; flex-direction: column; gap: 12px; }
    .event {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .event .date-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .event .date {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-deep);
      line-height: 1;
    }
    .event .weekday { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
    .event .type-tag {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-deep);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .event .title {
      font-size: 16px;
      font-weight: 700;
      margin: 4px 0 8px;
      color: var(--ink);
      word-break: break-word;
    }
    .event .row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-size: 13px;
      color: var(--ink-soft);
      margin-top: 4px;
      line-height: 1.5;
      word-break: break-word;
    }
    .event .row .row-label {
      font-size: 11px;
      font-weight: 700;
      min-width: 64px;
      color: var(--ink-faint);
      flex-shrink: 0;
    }
    .event .row .row-value { flex: 1; color: var(--ink); }
    .event .benefits {
      margin: 10px 0 0;
      padding: 10px 12px;
      background: #FFF8FB;
      border-radius: 10px;
      border: 1px dashed var(--border);
    }
    .event .benefits .ben-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-deep);
      margin-bottom: 4px;
    }
    .event .benefits ul {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      color: var(--ink);
      line-height: 1.6;
    }

    /* D-20260622-02 / 073: チケット種別表示 */
    .event .tickets { margin-top: 10px; }
    .event .tickets-label {
      font-size: 11px;
      font-weight: 700;
      min-width: 64px;
      color: var(--ink-faint);
      margin-bottom: 6px;
    }
    .event .tickets-empty {
      font-size: 13px;
      color: var(--ink-soft);
    }
    .event .tickets-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .event .tickets-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      font-size: 13px;
      color: var(--ink);
      padding: 6px 10px;
      background: #FFF8FB;
      border-radius: 8px;
    }
    .event .tickets-name {
      font-weight: 700;
      color: var(--ink);
    }
    .event .tickets-price {
      font-weight: 800;
      color: var(--primary-deep);
    }
    .event .tickets-price.free { color: #1ABC9C; }
    .event .tickets-link {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--primary);
      transition: opacity 0.15s;
    }
    .event .tickets-link:hover { opacity: 0.75; }

    .empty, .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.7;
    }
    .empty .icon, .error .icon { font-size: 40px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
      font-size: 14px;
    }
    .loading .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.15s; }
    .loading .loading-dot-3 { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 11px;
      color: var(--ink-faint);
      line-height: 1.7;
    }
    .footer .footer-label { font-weight: 700; color: var(--ink-soft); }
  </style>
  <!-- D-20260620-01 / v7: Supabase SDK と本体 JS を defer 読み込み (= inline script 禁止 / CSP 整合) -->
  <!-- D-20260622-02 / v10: ?v=2 で Cloudflare / ブラウザキャッシュを cache bust -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="calendar.js?v=2" defer></script>
</head>
<body>
  <div class="wrap">
    <div id="root" class="loading" role="status" aria-live="polite">
      <div><span class="dot"></span><span class="dot"></span><span class="dot loading-dot-3"></span></div>
      <div style="margin-top: 12px;">読み込み中...</div>
    </div>
    <div class="footer">
      <div class="footer-label">推しブル / Oshibul 公式カレンダー</div>
      <div>このページは検索エンジンには載せていません。</div>
    </div>
  </div>
</body>
</html>
